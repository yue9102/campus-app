name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: 

# 1. 必须添加权限设置，否则机器人没法发布网页
permissions:
  contents: read
  pages: write
  id-token: write

# 2. 允许同时只能有一个部署任务，防止冲突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        # 这一步是把 dist 文件夹里的东西“打包”交给下一步
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist 

  deploy:
    # 这一步才是真正让 404 消失的操作
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
